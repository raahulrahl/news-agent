site_name: news-agent
repo_url: https://github.com/Paraschamoli/news-agent
site_url: https://Paraschamoli.github.io/news-agent
site_description: The news-agents project represents a sophisticated implementation of terminal-based multi-agent coordination for news aggregation. Its architecture demonstrates innovative use of tmux for visual agent management, MCP for tool integration, and template-driven content generation. The codebase is well-structured, comprehensively documented, and serves as an excellent reference for building distributed agent systems using modern AI tools and terminal technologies.
site_author: Paras Chamoli
edit_uri: edit/main/docs/
repo_name: Paraschamoli/news-agent
copyright: Maintained by <a href="https://Paraschamoli.com">Paraschamoli</a>.

nav:
  - Home: index.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/news_agent"]
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Paraschamoli/news-agent
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/news-agent

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
